<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Khách sạn Phương Đông</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-[#d6e4ff] overflow-hidden">
 
    <!-- Container tổng chia đôi màn hình -->
    <div class="w-full h-screen flex flex-col md:flex-row items-center justify-between">
 
        <!-- Bên trái: Ảnh nền khách sạn -->
        <div class="w-full md:w-3/5 h-full hidden md:block relative">
            <img src="dn2.webp" alt="Khách sạn Phương Đông" class="w-full h-full object-cover">
        </div>
 
        <!-- Bên phải: Khung form đăng ký -->
        <div class="w-full md:w-2/5 h-full flex items-center justify-center p-6 md:p-12 bg-[#d6e4ff] overflow-y-auto">
            <div class="bg-white rounded-[24px] shadow-2xl p-8 md:p-10 w-full max-w-md my-6">
 
                <div class="text-center mb-6">
                    <img src="logoks.jpg" alt="Logo" class="w-16 h-16 mx-auto mb-3 object-contain" onerror="this.src='https://placehold.co/64'">
                    <h1 class="text-xl font-bold text-gray-900">Khách sạn Phương Đông</h1>
                    <p class="text-xs text-gray-400 mt-1">Tạo tài khoản để đặt phòng nhanh hơn và theo dõi lịch lưu trú</p>
                </div>
 
                <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Họ và tên</label>
                            <input type="text" id="fullName" required placeholder="Nguyễn Văn A"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Số điện thoại</label>
                            <input type="tel" id="phone" required placeholder="09xxxxxxxx"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                        </div>
                    </div>
 
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Email</label>
                        <input type="email" id="email" required placeholder="ban@email.com"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                    </div>
 
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Tên đăng nhập</label>
                        <input type="text" id="username" required placeholder="Tạo tên đăng nhập"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                    </div>
 
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Mật khẩu</label>
                            <input type="password" id="password" required minlength="6" placeholder="Tối thiểu 6 ký tự"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Nhập lại mật khẩu</label>
                            <input type="password" id="confirmPassword" required placeholder="Xác nhận mật khẩu"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                        </div>
                    </div>
 
                    <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-[12px] text-blue-700">
                        <b>Lưu ý:</b> tài khoản khách hàng dùng để đặt phòng, xem lịch sử lưu trú và nhận ưu đãi. Bạn không cần mã nội bộ như tài khoản nhân viên.
                    </div>
 
                    <label class="flex items-start gap-2 text-[12px] text-gray-600 cursor-pointer">
                        <input type="checkbox" id="agreeTerms" required class="w-4 h-4 mt-0.5 accent-blue-600 rounded">
                        <span>Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật thông tin của khách sạn.</span>
                    </label>
 
                    <p id="error-msg" class="text-red-500 text-xs text-center font-medium"></p>
 
                    <button type="submit" class="w-full bg-[#2563eb] hover:bg-blue-700 text-white py-3.5 rounded-xl font-semibold text-sm transition shadow-md">
                        Tạo tài khoản
                    </button>
 
                    <p class="text-center text-xs text-gray-500 pt-1">
                        Đã có tài khoản?
                        <a href="dangnhapkh.html" class="text-blue-600 hover:underline font-semibold">Đăng nhập</a>
                    </p>
                </form>
 
            </div>
        </div>
 
    </div>
 
    <script>
        function handleRegister(event) {
            event.preventDefault();
            const errorMsg = document.getElementById('error-msg');
 
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreed = document.getElementById('agreeTerms').checked;
 
            if (password !== confirmPassword) {
                errorMsg.textContent = "❌ Mật khẩu nhập lại không khớp!";
                return;
            }
            if (password.length < 6) {
                errorMsg.textContent = "❌ Mật khẩu cần tối thiểu 6 ký tự!";
                return;
            }
            if (!agreed) {
                errorMsg.textContent = "❌ Vui lòng đồng ý điều khoản sử dụng để tiếp tục!";
                return;
            }
 
            // Lưu tạm tài khoản để demo đăng nhập (chỉ phục vụ giao diện, chưa kết nối máy chủ)
            const accounts = JSON.parse(localStorage.getItem('demoCustomerAccounts') || '[]');
            if (accounts.some(acc => acc.username === username)) {
                errorMsg.textContent = "❌ Tên đăng nhập đã tồn tại, vui lòng chọn tên khác!";
                return;
            }
 
            accounts.push({ fullName, phone, email, username, password });
            localStorage.setItem('demoCustomerAccounts', JSON.stringify(accounts));
 
            errorMsg.textContent = "";
            alert(`✅ Tạo tài khoản thành công! Chào mừng ${fullName} đến với Khách sạn Phương Đông.`);
            window.location.href = "customer-login.html";
        }
    </script>
</body>
</html>
