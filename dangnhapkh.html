<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập khách hàng - Khách sạn Phương Đông</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-[#d6e4ff] overflow-hidden">

    <!-- Container tổng chia đôi màn hình -->
    <div class="w-full h-screen flex flex-col md:flex-row items-center justify-between">

        <!-- Bên trái: Ảnh nền khách sạn -->
        <div class="w-full md:w-3/5 h-full hidden md:block relative">
            <img src="dn2.webp" alt="Khách sạn Phương Đông" class="w-full h-full object-cover">
        </div>

        <!-- Bên phải: Khung form đăng nhập -->
        <div class="w-full md:w-2/5 h-full flex items-center justify-center p-6 md:p-12 bg-[#d6e4ff] overflow-y-auto">
            <div class="bg-white rounded-[24px] shadow-2xl p-8 md:p-10 w-full max-w-md">

                <div class="text-center mb-6">
                    <img src="logoks.jpg" alt="Logo" class="w-16 h-16 mx-auto mb-3 object-contain" onerror="this.src='https://placehold.co/64'">
                    <h1 class="text-xl font-bold text-gray-900">Khách sạn Phương Đông</h1>
                    <p class="text-xs text-gray-400 mt-1">Đăng nhập để đặt phòng và quản lý lịch lưu trú</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Email hoặc số điện thoại</label>
                        <input type="text" id="username" placeholder="Nhập email hoặc số điện thoại"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600">
                    </div>

                    <div>
                        <label class="block text-[11px] font-semibold text-gray-700 mb-1.5">Mật khẩu</label>
                        <div class="relative">
                            <input type="password" id="password" placeholder="Nhập mật khẩu"
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-600 pr-10">
                            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fa-solid fa-eye" id="toggle-icon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Ghi nhớ đăng nhập + Quên mật khẩu -->
                    <div class="flex items-center justify-between text-xs pt-1">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked class="w-4 h-4 accent-blue-600 rounded">
                            <span class="text-gray-600">Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" onclick="forgotPassword()" class="text-blue-600 hover:underline font-medium">
                            Quên mật khẩu?
                        </a>
                    </div>

                    <!-- Hiển thị thông báo lỗi nếu nhập sai -->
                    <p id="error-msg" class="text-red-500 text-xs text-center font-medium"></p>

                    <!-- Nút Đăng Nhập -->
                    <button onclick="login()" class="w-full bg-[#2563eb] hover:bg-blue-700 text-white py-3.5 rounded-xl font-semibold text-sm transition shadow-md">
                        Đăng nhập
                    </button>

                    <!-- Link sang đăng ký -->
                    <p class="text-center text-xs text-gray-500 pt-2">
                        Chưa có tài khoản?
                        <a href="dangky.html" class="text-blue-600 hover:underline font-semibold">Đăng ký ngay</a>
                    </p>
                </div>

            </div>
        </div>

    </div>

    <script>
        function togglePassword() {
            const pass = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            if (pass.type === 'password') {
                pass.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pass.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function login() {
            const userBox = document.getElementById('username').value.trim();
            const passBox = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (!userBox || !passBox) {
                errorMsg.textContent = "❌ Vui lòng nhập đầy đủ email/số điện thoại và mật khẩu!";
                return;
            }

            // Tài khoản khách hàng mẫu để demo giao diện
            const demoAccounts = JSON.parse(localStorage.getItem('demoCustomerAccounts') || '[]');
            const found = demoAccounts.find(acc => acc.username === userBox && acc.password === passBox);
            const isDemoDefault = (userBox === "khach@demo.com" && passBox === "123456");

            if (!found && !isDemoDefault) {
                errorMsg.textContent = "❌ Sai email/số điện thoại hoặc mật khẩu!";
                return;
            }

            const loggedInCustomer = found || { fullName: "Quý khách", email: "khach@demo.com", username: userBox };
            sessionStorage.setItem('loggedInCustomer', JSON.stringify(loggedInCustomer));

            errorMsg.textContent = "";
            alert("✅ Đăng nhập thành công! Chào mừng bạn quay lại.");
            window.location.href = "dashboardkh.html";
        }

        function forgotPassword() {
            alert("Vui lòng liên hệ lễ tân hoặc hotline khách sạn để được hỗ trợ lấy lại mật khẩu!");
        }
    </script>
</body>
</html>
